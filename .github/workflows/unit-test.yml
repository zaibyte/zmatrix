name: unit-test

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.4
          cache: true

      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Run test
        run: go test -v ./...
